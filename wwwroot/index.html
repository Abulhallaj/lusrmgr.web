<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Access Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-body">

    <header class="main-header">
        <!-- نام این بخش به صورت داینامیک از فایل سی‌شارپ خوانده می‌شود -->
        <div class="logo" id="mainLogo">PORTAL</div>
        <button class="lang-btn" id="langToggleBtn" onclick="toggleLanguage()">English</button>
    </header>

    <main class="landing-container">
        <div class="hero-content">
            <h1 id="heroTitle" class="glow-text">سامانه مدیریت</h1>
            <p id="heroDesc"></p>
            <a href="changepass.html" id="heroBtn" class="btn-cyber">ورود</a>
        </div>

        <!-- قرارگیری تصویر سرور با افکت شناور حرفه‌ای -->
        <div class="hero-graphics">
            <img src="img/server.png" alt="Server Rack" class="server-image-fluid">
        </div>
    </main>

    <!-- لینک درباره سیستم؛ بسیار مات، محو و شیک در گوشه صفحه -->
    <div class="about-link-container">
        <a href="javascript:void(0)" class="about-link-text" onclick="toggleAboutModal()">درباره</a>
        <div id="aboutModal" class="about-modal" style="display: none;">
            <h4 id="aboutTitle">مشخصات سامانه</h4>
            <p id="aboutVer"></p>
            <p id="aboutDev" class="dev-info"></p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        initLandingLanguage();
    </script>
</body>
</html>
